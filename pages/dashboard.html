<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TECSOLED · Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-breadcrumb">
          <span>TECSOLED ERP</span>
          <span class="topbar-sep">/</span>
          <span>Dashboard</span>
        </div>
      </div>
      <div class="topbar-right">
        <div class="period-tabs" id="periodTabs">
          <button class="period-tab active" data-p="mes">MES</button>
          <button class="period-tab" data-p="trimestre">TRIM.</button>
          <button class="period-tab" data-p="anio">AÑO</button>
        </div>
        <span class="topbar-date" id="topbarDate"></span>
      </div>
    </header>

    <main class="page">
      <div class="page-head fade-up">
        <p class="page-eyebrow">Administración</p>
        <h1 class="page-title">FACTURACIÓN</h1>
        <p class="page-sub">Métricas y evolución en tiempo real</p>
      </div>

      <!-- KPIs -->
      <div class="kpi-grid" id="kpiGrid">
        <div class="kpi"><div class="skel" style="height:110px"></div></div>
        <div class="kpi"><div class="skel" style="height:110px"></div></div>
        <div class="kpi"><div class="skel" style="height:110px"></div></div>
      </div>

      <!-- Gráfica + Comparativa -->
      <div class="dash-grid">
        <div class="card fade-up">
          <div class="card-head">
            <p class="card-title">Evolución mensual</p>
            <span class="badge badge-gray" id="chartYearBadge"></span>
          </div>
          <div class="card-body">
            <div class="chart-wrap">
              <canvas id="evChart"></canvas>
            </div>
          </div>
        </div>

        <div class="card fade-up">
          <div class="card-head">
            <p class="card-title">Comparativa</p>
          </div>
          <div class="card-body" id="compContent">
            <div class="skel" style="height:220px"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/dashboard.js"></script>
</body>
</html>
